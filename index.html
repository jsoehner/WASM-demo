<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.openai.com https://openrouter.ai http://localhost:11434; upgrade-insecure-requests;">
    <title>WASM LLM Agent | Premium Edition</title>
    
    <!-- External Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .dark-mode {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -12px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, transform 0.2s;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(to right, var(--primary), #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select, textarea {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .advanced-toggle {
            font-size: 0.85rem;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
            display: inline-block;
        }

        #advanced-settings {
            display: none;
            padding: 1.5rem;
            background: rgba(0,0,0,0.03);
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px dashed var(--border);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            border-color: var(--error);
            color: var(--error);
        }

        #log-container {
            margin-top: 2rem;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #log-header {
            background: var(--border);
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        #log {
            background: #1e293b;
            color: #f8fafc;
            padding: 1.5rem;
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
        }

        .markdown-body pre {
            background: #0f172a !important;
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
        }

        .markdown-body code {
            font-family: 'Fira Code', monospace;
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        .status-pill {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--border);
        }

        .history-item {
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .copy-btn:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 WASM Agent</h1>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <div id="status-pill" class="status-pill">Ready</div>
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
            </div>
        </header>

        <div class="grid">
            <div class="form-group">
                <label for="provider">Provider</label>
                <select id="provider" onchange="onProviderChange(); saveConfig()">
                    <option value="openrouter">OpenRouter</option>
                    <option value="openai">OpenAI</option>
                    <option value="ollama">Ollama</option>
                </select>
            </div>
            <div class="form-group">
                <label for="model-id">Model ID</label>
                <input type="text" id="model-id" value="mistralai/mistral-7b-instruct:free" oninput="saveConfig()">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="api-url">API Endpoint URL</label>
            <input type="text" id="api-url" value="https://openrouter.ai/api/v1" oninput="saveConfig()">
        </div>

        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="api-key">API Key</label>
            <input type="password" id="api-key" placeholder="••••••••••••••••" oninput="saveConfig()">
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                <input type="checkbox" id="save-key" onchange="saveConfig()" style="width: auto;">
                <label for="save-key" style="margin: 0;">Persist key in browser</label>
            </div>
        </div>

        <span class="advanced-toggle" onclick="toggleAdvanced()">⚙️ Advanced Settings</span>
        <div id="advanced-settings">
            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="system-prompt">System Instructions</label>
                <textarea id="system-prompt" rows="2" placeholder="e.g. You are a helpful coding assistant..." oninput="saveConfig()"></textarea>
            </div>
            <div class="grid">
                <div class="slider-group">
                    <div class="slider-header">
                        <label>Temperature</label>
                        <span id="temp-val" style="font-size: 0.8rem; font-weight: 600;">0.7</span>
                    </div>
                    <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" oninput="updateVal('temp-val', this.value); saveConfig()">
                </div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="prompt">Message</label>
            <textarea id="prompt" rows="3" placeholder="Type your message here..." oninput="saveConfig()"></textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <button id="run-btn" class="btn-primary" onclick="runAgent()">
                <span id="btn-text">Execute Agent</span>
            </button>
            <button id="stop-btn" class="btn-secondary" style="display: none;" onclick="stopAgent()">
                ⏹ Stop
            </button>
        </div>

        <div id="log-container">
            <div id="log-header">
                <span>TERMINAL OUTPUT</span>
                <span id="timing" style="opacity: 0.7;">0ms</span>
            </div>
            <div id="log" class="markdown-body">Welcome. Configure your provider and click Execute to start.</div>
        </div>

        <button class="config-toggle" style="margin-top: 2rem; width: 100%; text-align: left;" onclick="toggleHistory()">📜 Conversation History</button>
        <div id="history-section" style="display: none; margin-top: 1rem;">
            <div id="history-list"></div>
            <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                <button onclick="clearHistory()" style="flex: 1; padding: 0.5rem; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--text); cursor: pointer;">Clear History</button>
                <button onclick="exportConversation()" style="flex: 1; padding: 0.5rem; border-radius: 8px; background: var(--primary); color: white; border: none; cursor: pointer;">Export Markdown</button>
            </div>
        </div>
    </div>

    <script>
        let wasmAgent = null;
        let abortController = null;

        // Marked.js Configuration
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        const PROVIDER_DEFAULTS = {
            openrouter: { url: 'https://openrouter.ai/api/v1', model: 'mistralai/mistral-7b-instruct:free' },
            openai:     { url: 'https://api.openai.com/v1',     model: 'gpt-4o-mini' },
            ollama:     { url: 'http://localhost:11434/api',     model: 'llama3' },
        };

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
        }

        function toggleAdvanced() {
            const el = document.getElementById('advanced-settings');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function updateVal(id, val) {
            document.getElementById(id).textContent = val;
        }

        function onProviderChange() {
            const provider = document.getElementById('provider').value;
            const defaults = PROVIDER_DEFAULTS[provider];
            if (defaults) {
                document.getElementById('api-url').value = defaults.url;
                document.getElementById('model-id').value = defaults.model;
            }
            wasmAgent = null;
        }

        async function initWasm() {
            if (wasmAgent) return;
            const module = await import('./pkg/wasm_agent.js');
            await module.default();
            return module.Agent;
        }

        async function runAgent() {
            const log = document.getElementById('log');
            const runBtn = document.getElementById('run-btn');
            const stopBtn = document.getElementById('stop-btn');
            const statusPill = document.getElementById('status-pill');
            
            runBtn.disabled = true;
            stopBtn.style.display = 'flex';
            runBtn.innerHTML = '<div class="spinner"></div> Streaming...';
            statusPill.textContent = 'Streaming';
            statusPill.style.background = 'var(--primary)';
            statusPill.style.color = 'white';
            
            log.innerHTML = ''; // Clear for streaming
            let fullText = '';
            
            try {
                const config = {
                    provider: document.getElementById('provider').value,
                    apiUrl: document.getElementById('api-url').value,
                    apiKey: document.getElementById('api-key').value,
                    modelId: document.getElementById('model-id').value,
                    prompt: document.getElementById('prompt').value,
                    systemPrompt: document.getElementById('system-prompt').value,
                    temp: parseFloat(document.getElementById('temperature').value)
                };

                if (!config.prompt.trim()) throw new Error("Please enter a message.");

                if (!wasmAgent) {
                    const AgentClass = await initWasm();
                    wasmAgent = new AgentClass(config.apiUrl, config.apiKey, config.provider);
                }

                abortController = new AbortController();
                const start = Date.now();

                await wasmAgent.run_task_stream(
                    config.modelId, 
                    config.prompt, 
                    config.systemPrompt, 
                    config.temp,
                    (chunk) => {
                        fullText += chunk;
                        log.innerHTML = marked.parse(fullText);
                        // Auto-scroll to bottom
                        log.scrollTop = log.scrollHeight;
                    },
                    abortController.signal
                );

                const duration = Date.now() - start;
                document.getElementById('timing').textContent = `${duration}ms`;
                
                // Final render to ensure highlight.js runs
                log.innerHTML = marked.parse(fullText);
                hljs.highlightAll();
                addCopyButtons();
                
                saveHistory(config.prompt, fullText, duration);
                statusPill.textContent = 'Success';
                statusPill.style.background = 'var(--success)';
            } catch (e) {
                if (e.name === 'AbortError') {
                    statusPill.textContent = 'Stopped';
                    statusPill.style.background = 'var(--text-muted)';
                } else {
                    log.innerHTML = `<div style="color: var(--error)">Error: ${e.message || e}</div>`;
                    statusPill.textContent = 'Error';
                    statusPill.style.background = 'var(--error)';
                }
            } finally {
                runBtn.disabled = false;
                stopBtn.style.display = 'none';
                runBtn.innerHTML = 'Execute Agent';
                abortController = null;
                setTimeout(() => {
                    statusPill.textContent = 'Ready';
                    statusPill.style.background = 'var(--border)';
                    statusPill.style.color = 'var(--text-muted)';
                }, 3000);
            }
        }

        function stopAgent() {
            if (abortController) {
                abortController.abort();
            }
        }

        function addCopyButtons() {
            const blocks = document.querySelectorAll('pre code');
            blocks.forEach((block) => {
                if (block.parentNode.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = () => {
                    navigator.clipboard.writeText(block.textContent);
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy', 2000);
                };
                block.parentNode.style.position = 'relative';
                block.parentNode.appendChild(btn);
            });
        }

        function saveConfig() {
            const shouldSaveKey = document.getElementById('save-key').checked;
            const config = {
                provider: document.getElementById('provider').value,
                modelId: document.getElementById('model-id').value,
                apiUrl: document.getElementById('api-url').value,
                apiKey: shouldSaveKey ? document.getElementById('api-key').value : '',
                prompt: document.getElementById('prompt').value,
                systemPrompt: document.getElementById('system-prompt').value,
                temp: document.getElementById('temperature').value,
                saveKey: shouldSaveKey
            };
            localStorage.setItem('wasm-agent-config', JSON.stringify(config));
        }

        function loadConfig() {
            const saved = JSON.parse(localStorage.getItem('wasm-agent-config') || '{}');
            if (saved.provider) {
                document.getElementById('provider').value = saved.provider;
                document.getElementById('model-id').value = saved.modelId;
                document.getElementById('api-url').value = saved.apiUrl;
                document.getElementById('api-key').value = saved.apiKey || '';
                document.getElementById('prompt').value = saved.prompt || '';
                document.getElementById('system-prompt').value = saved.systemPrompt || '';
                document.getElementById('temperature').value = saved.temp || 0.7;
                document.getElementById('save-key').checked = !!saved.saveKey;
                updateVal('temp-val', saved.temp || 0.7);
            }

            const theme = localStorage.getItem('theme');
            if (theme === 'dark') toggleTheme();
        }

        function saveHistory(prompt, response, duration) {
            const historyItem = {
                prompt: prompt,
                response: response,
                duration: duration,
                timestamp: new Date().toLocaleString()
            };
            let history = JSON.parse(localStorage.getItem('wasm-agent-history') || '[]');
            history.unshift(historyItem);
            localStorage.setItem('wasm-agent-history', JSON.stringify(history.slice(0, 20)));
            if (document.getElementById('history-section').style.display === 'block') displayHistory();
        }

        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('wasm-agent-history') || '[]');
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? history.map(item => `
                <div class="history-item">
                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;">${item.timestamp} • ${item.duration}ms</div>
                    <div style="font-weight: 600; margin-bottom: 0.5rem;">Q: ${item.prompt}</div>
                    <div class="markdown-body" style="font-size: 0.9rem;">${marked.parse(item.response)}</div>
                </div>
            `).join('') : '<p style="color: var(--text-muted)">No history yet.</p>';
            hljs.highlightAll();
        }

        function toggleHistory() {
            const el = document.getElementById('history-section');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
            if (el.style.display === 'block') displayHistory();
        }

        function clearHistory() {
            if (confirm("Clear all history?")) {
                localStorage.removeItem('wasm-agent-history');
                displayHistory();
            }
        }

        function exportConversation() {
            const history = JSON.parse(localStorage.getItem('wasm-agent-history') || '[]');
            const md = history.map(h => `### ${h.timestamp}\n\n**Prompt:** ${h.prompt}\n\n**Response:**\n${h.response}`).join('\n\n---\n\n');
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'conversation-export.md';
            a.click();
        }

        window.addEventListener('load', loadConfig);
    </script>
</body>
</html>
