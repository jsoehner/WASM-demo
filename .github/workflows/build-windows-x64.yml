name: Build Windows WASM Package (Legacy Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Build WASM package (Windows)
        run: wasm-pack build --target web --out-dir pkg --out-name wasm_agent wasm-agent

      - name: Upload Windows WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-wasm-pkg
          path: pkg/
