name: Build and Deploy WASM

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs -y | sh
          source $HOME/.cargo/env
          rustup target add wasm32-unknown-unknown

      - name: Build WASM
        run: |
          source $HOME/.cargo/env
          cargo install wasm-pack
          cd wasm-agent
          wasm-pack build --target web --out-dir ../viewer/pkg --out-name wasm_agent

      - name: Copy WASM binaries
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: viewer/pkg/

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WASM binaries
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: viewer/

      - name: Verify deployment
        run: |
          ls -la viewer/pkg/
        working-directory: ${{ github.workspace }}

      - name: Upload viewer artifact
        uses: actions/upload-artifact@v4
        with:
          name: viewer-deployment
          path: viewer/

  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download viewer
        uses: actions/download-artifact@v4
        with:
          name: viewer-deployment
          path: viewer/

      - name: Verify structure
        run: |
          echo "=== Viewer Structure ==="
          find viewer -type f | head -20

      - name: Rebuild distribution with server scripts
        run: |
          echo "📦 Rebuilding distribution package..."
          cd viewer
          # Regenerate dist/ directory
          bash ../package-viewer.sh 2>/dev/null || true
          echo "✅ Distribution package rebuilt"

      - name: Verify dist directory contents
        run: |
          echo "=== Checking dist/ directory ==="
          if [ -d "dist" ]; then
            ls -la dist/
            echo ""
            echo "Files in dist/:"
            find dist -type f | sort
          else
            echo "❌ ERROR: dist/ directory not found!"
            echo "The package-viewer.sh script failed to create the distribution."
            exit 1
          fi

      - name: Test server startup
        run: |
          echo "=== Testing server startup ==="
          cd dist
          echo "Starting server for 5 seconds..."
          timeout 5 ./start-server.sh 2>&1 || (echo "❌ Server failed to start" && exit 1)
          echo "✅ Server started successfully!"

      - name: Verify distribution contents
        run: |
          echo "=== Verifying distribution contents ==="
          ls -la dist/
          echo ""
          echo "Files in dist/:"
          find dist -type f | sort

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            viewer/dist
            viewer/dist/**/*.log
          retention-days: 1
"