name: Build and Deploy WASM (Legacy Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Build WASM package
        run: bash build.sh

      - name: Upload WASM files
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: |
            viewer/pkg/wasm_agent.js
            viewer/pkg/wasm_agent_bg.wasm
            viewer/pkg/wasm_agent.d.ts
            viewer/pkg/wasm_agent_bg.wasm.d.ts

  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WASM files
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: downloaded/

      - name: Assemble deployment directory
        run: |
          set -euo pipefail
          mkdir -p deployment/pkg
          cp viewer/index.html deployment/

          for f in wasm_agent.js wasm_agent_bg.wasm wasm_agent.d.ts wasm_agent_bg.wasm.d.ts; do
            src="$(find downloaded -type f -name "$f" | head -n1 || true)"
            if [ -z "$src" ]; then
              echo "Missing artifact file: $f"
              exit 1
            fi
            cp "$src" "deployment/pkg/$f"
          done

          ls -la deployment/pkg

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: viewer-deployment
          path: deployment/

  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Download deployment
        uses: actions/download-artifact@v4
        with:
          name: viewer-deployment
          path: deployment/

      - name: Verify deployment structure
        run: |
          set -euo pipefail
          test -f deployment/index.html
          test -f deployment/pkg/wasm_agent.js
          test -f deployment/pkg/wasm_agent_bg.wasm
          test -f deployment/pkg/wasm_agent.d.ts
          test -f deployment/pkg/wasm_agent_bg.wasm.d.ts

      - name: Test local server startup
        run: |
          set -euo pipefail
          python3 -m http.server 8000 --directory deployment >/tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          curl -fsS http://localhost:8000/index.html >/dev/null
          kill $SERVER_PID || true
