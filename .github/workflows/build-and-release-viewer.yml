name: Build and Release Viewer Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: false
        default: beta
        type: choice
        options:
          - beta
          - stable
          - nightly

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-package:
    name: Build and Package Viewer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Make build scripts executable
        run: chmod +x build.sh package.sh

      - name: Build and create package archive
        run: ./package.sh

      - name: List generated archives
        run: |
          ls -la wasm-agent-viewer-*.zip 2>/dev/null || true
          ls -la wasm-agent-viewer-*.tar.gz 2>/dev/null || true

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viewer-distribution-${{ github.run_id }}
          path: |
            wasm-agent-viewer-*.zip
            wasm-agent-viewer-*.tar.gz
          if-no-files-found: error
          retention-days: 30

  test-distribution:
    name: Test Distribution Package
    needs: build-and-package
    runs-on: ubuntu-latest

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: viewer-distribution-${{ github.run_id }}
          path: test-dist/

      - name: Extract package and verify contents
        run: |
          set -euo pipefail
          ARCHIVE="$(ls test-dist/wasm-agent-viewer-*.zip 2>/dev/null | head -n1 || true)"
          if [ -n "$ARCHIVE" ]; then
            unzip -q "$ARCHIVE" -d extracted
          else
            ARCHIVE="$(ls test-dist/wasm-agent-viewer-*.tar.gz 2>/dev/null | head -n1 || true)"
            if [ -z "$ARCHIVE" ]; then
              echo "No distribution archive found"
              exit 1
            fi
            tar -xzf "$ARCHIVE" -C extracted
          fi

          PKG_DIR="$(find extracted -maxdepth 1 -type d -name 'wasm-agent-viewer-*' | head -n1)"
          test -n "$PKG_DIR"

          test -f "$PKG_DIR/index.html"
          test -f "$PKG_DIR/pkg/wasm_agent.js"
          test -f "$PKG_DIR/pkg/wasm_agent_bg.wasm"
          test -f "$PKG_DIR/start-server.sh"
          test -f "$PKG_DIR/start-server.bat"
          test -f "$PKG_DIR/start-server.ps1"

      - name: Test server startup
        run: |
          set -euo pipefail
          PKG_DIR="$(find extracted -maxdepth 1 -type d -name 'wasm-agent-viewer-*' | head -n1)"
          timeout 8 bash "$PKG_DIR/start-server.sh" >/tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          curl -fsS http://localhost:8000/index.html >/dev/null
          kill $SERVER_PID || true

  create-release:
    name: Create GitHub Release
    needs: [build-and-package, test-distribution]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: viewer-distribution-${{ github.run_id }}
          path: release-artifacts/

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WASM Agent Viewer ${{ steps.get_version.outputs.version }}
          body: |
            WASM Agent Viewer ${{ steps.get_version.outputs.version }}

            Download and extract the package, run the included start script,
            then open http://localhost:8000 in your browser.
          files: |
            release-artifacts/wasm-agent-viewer-*.zip
            release-artifacts/wasm-agent-viewer-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nightly-release:
    name: Create Nightly Release
    needs: [build-and-package, test-distribution]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'nightly'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: viewer-distribution-${{ github.run_id }}
          path: nightly-artifacts/

      - name: Get current date
        id: get_date
        run: |
          DATE=$(date +%Y%m%d)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: WASM Agent Viewer Nightly ${{ steps.get_date.outputs.date }}
          body: |
            Latest nightly build of the WASM Agent Viewer.
          files: |
            nightly-artifacts/wasm-agent-viewer-*.zip
            nightly-artifacts/wasm-agent-viewer-*.tar.gz
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
