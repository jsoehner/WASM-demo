name: Validate Universal Viewer Package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-package:
    name: Build Canonical Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Build package
        run: |
          chmod +x build.sh package.sh
          ./package.sh

      - name: Upload canonical distribution
        uses: actions/upload-artifact@v4
        with:
          name: universal-viewer-package
          path: |
            wasm-agent-viewer-*.zip
            wasm-agent-viewer-*.tar.gz
          if-no-files-found: error

  smoke-test:
    name: Smoke Test Extracted Package (${{ matrix.os }})
    needs: build-package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Download canonical distribution
        uses: actions/download-artifact@v4
        with:
          name: universal-viewer-package
          path: dist-artifact

      - name: Extract package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted
          ARCHIVE="$(ls dist-artifact/wasm-agent-viewer-*.zip 2>/dev/null | head -n1 || true)"
          if [ -n "$ARCHIVE" ]; then
            unzip -q "$ARCHIVE" -d extracted
          else
            ARCHIVE="$(ls dist-artifact/wasm-agent-viewer-*.tar.gz 2>/dev/null | head -n1 || true)"
            test -n "$ARCHIVE"
            tar -xzf "$ARCHIVE" -C extracted
          fi
          PKG_DIR="$(find extracted -maxdepth 1 -type d -name 'wasm-agent-viewer-*' | head -n1)"
          test -n "$PKG_DIR"
          test -f "$PKG_DIR/index.html"
          test -f "$PKG_DIR/pkg/wasm_agent.js"
          test -f "$PKG_DIR/pkg/wasm_agent_bg.wasm"

      - name: Extract package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path extracted | Out-Null
          $zip = Get-ChildItem dist-artifact\wasm-agent-viewer-*.zip -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zip) {
            Expand-Archive -Path $zip.FullName -DestinationPath extracted -Force
          } else {
            $tgz = Get-ChildItem dist-artifact\wasm-agent-viewer-*.tar.gz -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $tgz) { throw "No archive found" }
            tar -xzf $tgz.FullName -C extracted
          }
          $pkgDir = Get-ChildItem extracted -Directory | Where-Object { $_.Name -like 'wasm-agent-viewer-*' } | Select-Object -First 1
          if (-not $pkgDir) { throw "Package directory not found" }
          if (-not (Test-Path "$($pkgDir.FullName)\index.html")) { throw "index.html missing" }
          if (-not (Test-Path "$($pkgDir.FullName)\pkg\wasm_agent.js")) { throw "wasm_agent.js missing" }
          if (-not (Test-Path "$($pkgDir.FullName)\pkg\wasm_agent_bg.wasm")) { throw "wasm_agent_bg.wasm missing" }
