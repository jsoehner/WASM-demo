name: Build WASM Viewer

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wasm-matrix:
    name: Build WASM (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Build WASM package
        shell: bash
        run: bash build.sh

      - name: Upload OS-specific artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg-${{ matrix.os }}
          path: viewer/pkg/

  aggregate-viewer-artifacts:
    name: Aggregate Viewer Artifacts
    needs: build-wasm-matrix
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: wasm-pkg-*

      - name: Verify artifact structure
        run: |
          set -euo pipefail
          find artifacts -maxdepth 3 -type f | sort
          test -n "$(find artifacts -type f -name wasm_agent.js | head -n1)"
          test -n "$(find artifacts -type f -name wasm_agent_bg.wasm | head -n1)"

      - name: Upload combined artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: viewer-package
          path: artifacts/
