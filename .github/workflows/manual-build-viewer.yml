name: Manual Build Viewer Packages

on:
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: Upload build artifacts
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-package:
    name: Build and Package Viewer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Make scripts executable
        run: chmod +x build.sh package.sh

      - name: Build and package
        run: ./package.sh

      - name: List generated archives
        run: |
          ls -la wasm-agent-viewer-*.zip 2>/dev/null || true
          ls -la wasm-agent-viewer-*.tar.gz 2>/dev/null || true

      - name: Upload distribution artifacts
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viewer-distribution-${{ github.run_id }}
          path: |
            wasm-agent-viewer-*.zip
            wasm-agent-viewer-*.tar.gz
          if-no-files-found: error
          retention-days: 7
