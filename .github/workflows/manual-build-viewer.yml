name: Manual Build Viewer Packages

on:
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: 'Upload build artifacts'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-package:
    name: Build and Package Viewer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM module
        run: |
          cd wasm-agent
          wasm-pack build --target web --out-dir ../viewer/pkg --out-name wasm_agent

      - name: Make packaging scripts executable
        run: |
          chmod +x package-viewer.sh
          chmod +x build-and-package.sh

      - name: Create distribution package
        run: ./package-viewer.sh

      - name: List distribution contents
        run: |
          echo "=== Distribution Directory ==="
          ls -la dist/
          echo ""
          echo "=== Archive Files ==="
          ls -la *.zip *.tar.gz 2>/dev/null || true

      - name: Upload distribution artifacts
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viewer-distribution-${{ github.run_id }}
          path: |
            dist/
            wasm-agent-viewer-*.zip
            wasm-agent-viewer-*.tar.gz
          retention-days: 7

      - name: Upload individual packages
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viewer-zip-package
          path: wasm-agent-viewer-*.zip
          retention-days: 7

      - name: Upload TAR.GZ package
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viewer-tar-gz-package
          path: wasm-agent-viewer-*.tar.gz
          retention-days: 7